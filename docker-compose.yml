version: "3.9"

services:
  backend:
    build: &vicrispr_build 
      context: .
      dockerfile: Dockerfile
    image: vicrispr-app-image:latest
    container_name: vicrispr-backend
    environment:
      ENV_NAME: base
      PYTHONPATH: /app
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: vicrispr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "8099:8099"
    depends_on:
      - db
      - redis
      - rabbitmq
    networks:
      - vicrispr-net
    restart: always

  celery:
    build: *vicrispr_build
    image: vicrispr-app-image:latest
    container_name: vicrispr-celery
    entrypoint: "" 
    environment:
      ENV_NAME: base
      PYTHONPATH: /app
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: vicrispr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: bash -c "eval \"$$(micromamba shell hook --shell bash)\" && micromamba activate $$ENV_NAME && celery -A app.api.tasks.celery worker -Q lookUpComputing,nonModel,genomeWide --loglevel=info"
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
      - redis
      - db
      - backend
    networks:
      - vicrispr-net
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: vicrispr-rabbitmq
    networks:
      - vicrispr-net
    restart: always

  redis:
    image: redis:7
    container_name: vicrispr-redis
    networks:
      - vicrispr-net
    restart: always

  db:
    image: postgres:15
    container_name: vicrispr-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: vicrispr
    networks:
      - vicrispr-net
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always


volumes:
  db_data:

networks:
  vicrispr-net:
    external: true
